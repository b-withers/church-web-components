<!--
Reusable Church Component
Women's Bible Study Grid

Features
• Campus filtering
• Responsive card grid
• Metadata icons (day, dates, time, location)
• Register button CTA
• Mobile responsive layout

Dependencies
• Phosphor Icons
• Google Font: Lora

Usage
Drop this file into any HTML page, CMS block, or WordPress custom HTML block.
-->

<!-- Phosphor Icons CDN -->
<link
  rel="stylesheet"
  href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Lora:wght@700&display=swap"
  rel="stylesheet"
/>

<style>
  .wbs-wrap {
    --color-accent: #8dc63f;
    --color-accent-dark: #7bb52f;
    --color-primary: #053b5a;
    --color-meta: #4b5b66;
    --color-desc: #666;
    --color-header: #6b7b88;
    --color-divider: #e6e6e6;
    --color-card-bg: #ffffff;
    --color-card-border: rgba(0, 0, 0, 0.04);
    --color-shadow-sm: rgba(0, 0, 0, 0.07);
    --color-shadow-lg: rgba(0, 0, 0, 0.13);

    --icon-calendar: #4a90d9;
    --icon-daterange: #7b68c8;
    --icon-clock: #e8a020;
    --icon-location: #e05c5c;
    --icon-globe: #2aabbf;

    --radius-card: 14px;
    --radius-btn: 24px;
    --gap-grid: 28px;
    --pad-card: 28px;
    --font-title: 24px;
    --font-meta: 14px;
    --font-btn: 13px;
    --font-header: 22px;
  }

  /* FILTER BAR */

  .wbs-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
  }

  .wbs-filter-btn {
    background: transparent;
    border: 1.5px solid var(--color-divider);
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--color-meta);
    cursor: pointer;
    transition: 0.2s;
  }

  .wbs-filter-btn:hover {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: white;
  }

  .wbs-filter-btn.active {
    background: var(--color-accent);
    border-color: var(--color-accent);
    color: var(--color-primary);
  }

  /* CAMPUS HEADER */

  .campus-header {
    font-size: var(--font-header);
    font-weight: 700;
    color: var(--color-header);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 60px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    padding-left: 14px;
    border-bottom: 1px solid var(--color-divider);
    position: relative;
  }

  .campus-header::before {
    content: "";
    position: absolute;
    left: 0;
    top: 2px;
    bottom: 12px;
    width: 4px;
    background: var(--color-accent);
    border-radius: 2px;
  }

  /* GRID */

  .study-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap-grid);
  }

  @media (max-width: 1024px) {
    .study-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 640px) {
    .study-grid {
      grid-template-columns: 1fr;
    }
  }

  /* CARD */

  .study-card {
    background: linear-gradient(160deg, #ffffff 0%, #f8faf5 100%);
    border-radius: var(--radius-card);
    padding: var(--pad-card);
    box-shadow: 0 20px 50px var(--color-shadow-sm);
    display: flex;
    flex-direction: column;
    border: 1px solid var(--color-card-border);
    position: relative;
    transition: 0.3s ease;
  }

  .study-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 28px 60px var(--color-shadow-lg);
  }

  .study-title {
    font-family: "Lora", Georgia, serif;
    font-size: var(--font-title);
    font-weight: 700;
    color: var(--color-primary);
    margin-bottom: 14px;
  }

  .study-meta {
    font-size: var(--font-meta);
    color: var(--color-meta);
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .study-meta__item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .study-desc {
    font-size: var(--font-meta);
    color: var(--color-desc);
    line-height: 1.8;
    margin-bottom: 22px;
    flex-grow: 1;
  }

  .study-btn a {
    display: block;
    text-align: center;
    background: var(--color-accent);
    color: var(--color-primary);
    padding: 12px 20px;
    border-radius: var(--radius-btn);
    font-weight: 700;
    font-size: var(--font-btn);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .study-btn a:hover {
    background: var(--color-accent-dark);
  }
</style>

<div class="wbs-wrap">
  <div class="wbs-filters">
    <button class="wbs-filter-btn active" data-filter-campus="all">
      All Campuses
    </button>
    <button class="wbs-filter-btn" data-filter-campus="campus-a">
      Campus A
    </button>
    <button class="wbs-filter-btn" data-filter-campus="campus-b">
      Campus B
    </button>
    <button class="wbs-filter-btn" data-filter-campus="campus-c">
      Campus C
    </button>
    <button class="wbs-filter-btn" data-filter-campus="campus-d">
      Campus D
    </button>
    <button class="wbs-filter-btn" data-filter-campus="online">Online</button>
  </div>

  <!-- CAMPUS A -->

  <div class="wbs-campus-section" data-campus="campus-a">
    <div class="campus-header">Campus A</div>

    <div class="study-grid">
      <div class="study-card">
        <div class="study-title">Example Study</div>

        <div class="study-meta">
          <span class="study-meta__item"
            ><i class="ph ph-calendar"></i> Tuesday evenings</span
          >
          <span class="study-meta__item"
            ><i class="ph ph-clock"></i> 6:30 pm – 8:00 pm</span
          >
          <span class="study-meta__item"
            ><i class="ph ph-map-pin"></i> Room 101</span
          >
        </div>

        <div class="study-desc">
          Example description of the Bible study. Replace with your ministry
          content.
        </div>

        <div class="study-btn">
          <a href="#">Register</a>
        </div>
      </div>
    </div>
  </div>

  <!-- ONLINE -->

  <div class="wbs-campus-section" data-campus="online">
    <div class="campus-header">Online</div>

    <div class="study-grid">
      <div class="study-card">
        <div class="study-title">Online Bible Study</div>

        <div class="study-meta">
          <span class="study-meta__item"
            ><i class="ph ph-calendar"></i> Thursday nights</span
          >
          <span class="study-meta__item"
            ><i class="ph ph-clock"></i> 7:00 pm – 8:30 pm</span
          >
          <span class="study-meta__item"
            ><i class="ph ph-globe"></i> Online</span
          >
        </div>

        <div class="study-desc">
          Join participants online for a weekly scripture study and discussion.
        </div>

        <div class="study-btn">
          <a href="#">Register</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    let activeCampus = "all";

    function applyFilters() {
      let sections = document.querySelectorAll(".wbs-campus-section");

      sections.forEach((section) => {
        let show =
          activeCampus === "all" || section.dataset.campus === activeCampus;
        section.style.display = show ? "block" : "none";
      });
    }

    document.querySelectorAll("[data-filter-campus]").forEach((btn) => {
      btn.addEventListener("click", function () {
        document
          .querySelectorAll("[data-filter-campus]")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        activeCampus = btn.dataset.filterCampus;
        applyFilters();
      });
    });
  })();
</script>
