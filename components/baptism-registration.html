<div id="baptism-2026" class="ns-wrap" aria-label="Baptism 2026 Registration">
  <div class="ns-step" id="ns-step-location">
    <h2 class="ns-heading ns-main-heading">Where would you like to be baptized?</h2>
    <div class="ns-btn-group" role="group" aria-label="Locations"></div>
  </div>

  <div class="ns-step" id="ns-step-date" hidden>
    <h3 class="ns-heading">What date would you like to be baptized?</h3>
    <div class="ns-btn-group" role="group" aria-label="Dates"></div>
    <p class="ns-note ns-hidden" id="ns-no-dates">No upcoming baptism dates are available.</p>
  </div>

  <div class="ns-step" id="ns-step-time" hidden>
    <h3 class="ns-heading">Which service time would you like?</h3>
    <div class="ns-btn-group" role="group" aria-label="Service Times"></div>
    <p class="ns-note ns-hidden" id="ns-no-times">No service times are available for this date.</p>
  </div>

  <div class="ns-step" id="ns-step-register" hidden>
    <h3 class="ns-heading">Ready to register?</h3>
    <a id="ns-register" class="ns-cta" href="#" target="_blank" rel="noopener">Register Now</a>
    <p class="ns-reset">
      <button type="button" id="ns-reset-btn" class="ns-link">Change location or start over</button>
    </p>
  </div>
</div>

<style>
  #baptism-2026 [hidden] { display: none !important; }

  #baptism-2026.ns-wrap {
    max-width: 940px;
    margin: 0 auto;
    padding: 8px 6px;
    font-family: inherit;
    color: #053b5a;
  }

  #baptism-2026 .ns-step { margin: 20px 0 26px; }

  #baptism-2026 .ns-heading {
    font-size: 1.15rem;
    margin: 0 0 12px;
    letter-spacing: .2px;
  }

  #baptism-2026 .ns-main-heading {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 18px;
  }

  #baptism-2026 .ns-btn-group {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  @media (min-width: 640px) {
    #baptism-2026 .ns-btn-group { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (min-width: 900px) {
    #baptism-2026 .ns-btn-group { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  }

  #baptism-2026 .ns-btn {
    appearance: none;
    border: 2px solid #053b5a;
    background: #fff;
    color: #053b5a;
    border-radius: 9999px;
    padding: 12px 16px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.05);
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease, color .12s ease;

    /* word wrap */
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
    line-height: 1.2;
  }

  #baptism-2026 .ns-btn:hover,
  #baptism-2026 .ns-btn:focus-visible {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,0,0,.09);
  }

  #baptism-2026 .ns-btn[aria-pressed="true"] {
    background: #053b5a;
    color: #fff;
  }

  #baptism-2026 .ns-cta {
    display: inline-block;
    background: #053b5a;
    color: #fff;
    text-decoration: none;
    border-radius: 9999px;
    padding: 14px 22px;
    font-weight: 700;
    border: 2px solid #053b5a;
    box-shadow: 0 3px 12px rgba(0,0,0,.1);
    transition: transform .12s ease, box-shadow .12s ease;
  }

  #baptism-2026 .ns-cta:hover,
  #baptism-2026 .ns-cta:focus-visible {
    transform: translateY(-1px);
    box-shadow: 0 8px 22px rgba(0,0,0,.12);
  }

  #baptism-2026 .ns-note { font-size: .95rem; margin-top: 8px; }

  #baptism-2026 .ns-link {
    background: transparent;
    border: 0;
    color: #053b5a;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
    font: inherit;
  }

  #baptism-2026 .ns-hidden { display: none !important; }
</style>

(function () {
  const REGISTRATION_CLOSE_DAYS_BEFORE = 7;
  const CHURCH_HOUSE_URL = "https://my.livingproof.co/Registration?RegistrationInstanceId=384";

  const slug = s => String(s).toLowerCase()
    .replace(/&/g, 'and')
    .replace(/'/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');

  function show(el) { if (el) el.removeAttribute('hidden'); }
  function hide(el) { if (el) el.setAttribute('hidden', ''); }

  // Hide date once registrations close (N days before baptism)
  function isClosedDateISO(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    const baptismDate = new Date(y, m - 1, d);
    const closeDate = new Date(baptismDate);
    closeDate.setDate(closeDate.getDate() - REGISTRATION_CLOSE_DAYS_BEFORE);

    const today = new Date(); today.setHours(0, 0, 0, 0);
    closeDate.setHours(0, 0, 0, 0);

    return today >= closeDate;
  }

  // NEW behavior: show only the next 3 "active" months that actually have available dates
  function filterToNextThreeActiveMonths(sortedDates) {
    const months = [];
    for (const d of sortedDates) {
      const ym = d.iso.slice(0, 7); // YYYY-MM
      if (!months.includes(ym)) months.push(ym);
      if (months.length >= 3) break;
    }
    return sortedDates.filter(d => months.includes(d.iso.slice(0, 7)));
  }

  // Time helpers:
  // - "730", "900", "1050" => AM
  // - "300p", "515p", "530p", "500p" => PM
  function timeKeyToMinutes(key) {
    const k = String(key).trim().toLowerCase();
    const isP = k.endsWith('p');
    const isA = k.endsWith('a');
    const digits = (isP || isA) ? k.slice(0, -1) : k;

    const num = parseInt(digits, 10);
    if (!Number.isFinite(num)) return 0;

    const str = String(num);
    const mins = str.length > 2 ? parseInt(str.slice(-2), 10) : 0;
    const hrs  = str.length > 2 ? parseInt(str.slice(0, -2), 10) : parseInt(str, 10);

    let h24 = hrs;
    if (isP) h24 = (hrs % 12) + 12;
    else if (isA) h24 = (hrs === 12) ? 0 : hrs;

    return (h24 * 60) + mins;
  }

  function timeKeyToLabel(key) {
    const k = String(key).trim().toLowerCase();
    const isP = k.endsWith('p');
    const isA = k.endsWith('a');
    const digits = (isP || isA) ? k.slice(0, -1) : k;

    const num = parseInt(digits, 10);
    if (!Number.isFinite(num)) return String(key);

    const str = String(num);
    const mins = str.length > 2 ? parseInt(str.slice(-2), 10) : 0;
    const hrs  = str.length > 2 ? parseInt(str.slice(0, -2), 10) : parseInt(str, 10);

    const ampm = isP ? "PM" : "AM";
    let h12 = hrs % 12; if (h12 === 0) h12 = 12;
    return `${h12}:${String(mins).padStart(2, '0')} ${ampm}`;
  }

  // DOM
  const wrap = document.getElementById('baptism-2026');
  if (!wrap) return;

  const locGroup  = wrap.querySelector('#ns-step-location .ns-btn-group');
  const dateStep  = wrap.querySelector('#ns-step-date');
  const dateGroup = wrap.querySelector('#ns-step-date .ns-btn-group');
  const noDates   = wrap.querySelector('#ns-no-dates');

  const timeStep  = wrap.querySelector('#ns-step-time');
  const timeGroup = wrap.querySelector('#ns-step-time .ns-btn-group');
  const noTimes   = wrap.querySelector('#ns-no-times');

  const regStep   = wrap.querySelector('#ns-step-register');
  const regBtn    = wrap.querySelector('#ns-register');
  const resetBtn  = wrap.querySelector('#ns-reset-btn');

  let selected = { location: null, date: null, timeKey: null };

  function clearPressed(root) {
    Array.from(root.querySelectorAll('.ns-btn')).forEach(b => b.setAttribute('aria-pressed', 'false'));
  }

  function campusHasDate(lk, dk) {
    const node = REG_URLS?.[lk]?.[dk];
    return node && typeof node === 'object' && Object.keys(node).length > 0;
  }

  function renderLocations() {
    locGroup.innerHTML = '';

    LOCATIONS.forEach(loc => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ns-btn';
      btn.textContent = loc.name;
      btn.setAttribute('aria-pressed', 'false');

      btn.addEventListener('click', () => {
        clearPressed(locGroup);
        btn.setAttribute('aria-pressed', 'true');

        selected = { location: loc.name, date: null, timeKey: null };

        dateGroup.innerHTML = '';
        timeGroup.innerHTML = '';
        noDates.classList.add('ns-hidden');
        noTimes.classList.add('ns-hidden');
        hide(timeStep); hide(regStep);

        if (loc.special) {
          hide(dateStep);
          regBtn.href = CHURCH_HOUSE_URL;
          show(regStep);
          return;
        }

        renderDates();
      });

      locGroup.appendChild(btn);
    });
  }

  function renderDates() {
    const lk = slug(selected.location);

    let available = DATES
      .filter(d => campusHasDate(lk, d.key))
      .filter(d => !isClosedDateISO(d.iso))
      .sort((a, b) => a.iso.localeCompare(b.iso));

    // NEW: only show next 3 active months (skips empty months automatically)
    available = filterToNextThreeActiveMonths(available);

    dateGroup.innerHTML = '';
    show(dateStep);
    hide(timeStep); hide(regStep);

    if (available.length === 0) {
      noDates.classList.remove('ns-hidden');
      return;
    }

    available.forEach(d => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ns-btn';
      btn.textContent = d.label;
      btn.setAttribute('aria-pressed', 'false');

      btn.addEventListener('click', () => {
        clearPressed(dateGroup);
        btn.setAttribute('aria-pressed', 'true');

        selected.date = d;
        selected.timeKey = null;

        timeGroup.innerHTML = '';
        noTimes.classList.add('ns-hidden');
        hide(regStep);

        renderTimes();
      });

      dateGroup.appendChild(btn);
    });
  }

  function renderTimes() {
    const lk = slug(selected.location);
    const dk = selected?.date?.key;

    const timesObj = REG_URLS?.[lk]?.[dk];
    timeGroup.innerHTML = '';
    show(timeStep);

    if (!timesObj || typeof timesObj !== 'object' || Object.keys(timesObj).length === 0) {
      noTimes.classList.remove('ns-hidden');
      return;
    }

    Object.keys(timesObj)
      .sort((a, b) => timeKeyToMinutes(a) - timeKeyToMinutes(b))
      .forEach(tk => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'ns-btn';
        btn.textContent = timeKeyToLabel(tk);
        btn.setAttribute('aria-pressed', 'false');

        btn.addEventListener('click', () => {
          clearPressed(timeGroup);
          btn.setAttribute('aria-pressed', 'true');

          selected.timeKey = tk;
          regBtn.href = timesObj[tk];

          // IMPORTANT: no scrollIntoView here (prevents jumping)
          show(regStep);
        });

        timeGroup.appendChild(btn);
      });
  }

  function resetAll() {
    selected = { location: null, date: null, timeKey: null };
    clearPressed(wrap);

    dateGroup.innerHTML = '';
    timeGroup.innerHTML = '';
    noDates.classList.add('ns-hidden');
    noTimes.classList.add('ns-hidden');

    hide(dateStep); hide(timeStep); hide(regStep);
    wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  renderLocations();
  resetBtn.addEventListener('click', resetAll);
})();
</script>
